<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Туристическое агентство - Популярные направления</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="destinations-container">
        <div class="destination destination-maldives">
            <div class="destination-info">
                <h2 class="destination-title">Мальдивы</h2>
                <p class="destination-desc">Райские пляжи и прозрачная вода.</p>
            </div>
        </div>
        <div class="destination destination-paris">
            <div class="destination-info">
                <h2 class="destination-title">Париж</h2>
                <p class="destination-desc">Город романтики и Эйфелевой башни.</p>
            </div>
        </div>
        <div class="destination destination-tokyo">
            <div class="destination-info">
                <h2 class="destination-title">Токио</h2>
                <p class="destination-desc">Современность и традиции Японии.</p>
            </div>
        </div>
    </div>

</html>
